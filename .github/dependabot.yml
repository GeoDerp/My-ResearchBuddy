# GitHub Dependabot configuration for automated dependency updates
# Documentation: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Monitor Python dependencies in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "geo"  # Replace with your GitHub username
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Group all LangChain-related packages together since they're tightly coupled
      langchain:
        patterns:
          - "langchain*"
          - "langgraph*"
      # Group all patch and minor updates for non-LangChain dependencies
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "langchain*"
          - "langgraph*"

  # Monitor Docker base images in Dockerfile
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    reviewers:
      - "geo"  # Replace with your GitHub username
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps"
      include: "scope"
