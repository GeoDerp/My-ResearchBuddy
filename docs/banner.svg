<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <linearGradient id="r-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b2e"/>
    </linearGradient>
    <linearGradient id="r-warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2BBA7"/>
      <stop offset="50%" stop-color="#E8A087"/>
      <stop offset="100%" stop-color="#D4836B"/>
    </linearGradient>
    <linearGradient id="r-warm2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2BBA7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D4836B" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="r-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2BBA7"/>
      <stop offset="100%" stop-color="#D4836B"/>
    </linearGradient>
    <clipPath id="r-lens">
      <circle cx="88" cy="80" r="46"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" rx="10" fill="url(#r-bg)"/>
  <rect width="800" height="180" rx="10" fill="none" stroke="#D4836B" stroke-width="1" opacity="0.3"/>

  <!-- Subtle atmospheric glow behind icon -->
  <ellipse cx="88" cy="94" rx="66" ry="74" fill="#E8A087" opacity="0.05"/>

  <!-- Faint background nodes (atmosphere, right section) -->
  <circle cx="264" cy="38" r="2"   fill="#D4836B" opacity="0.18"/>
  <circle cx="358" cy="155" r="1.5" fill="#D4836B" opacity="0.14"/>
  <circle cx="502" cy="22" r="1.5" fill="#E8A087" opacity="0.12"/>
  <circle cx="644" cy="160" r="2"  fill="#D4836B" opacity="0.12"/>
  <circle cx="742" cy="30" r="1.5" fill="#E8A087" opacity="0.10"/>
  <circle cx="780" cy="150" r="1.5" fill="#D4836B" opacity="0.10"/>

  <!-- Faint connecting lines between background nodes -->
  <line x1="264" y1="38"  x2="358" y2="155" stroke="#D4836B" stroke-width="0.5" opacity="0.07"/>
  <line x1="502" y1="22"  x2="644" y2="160" stroke="#D4836B" stroke-width="0.5" opacity="0.07"/>
  <line x1="742" y1="30"  x2="780" y2="150" stroke="#D4836B" stroke-width="0.5" opacity="0.06"/>
  <line x1="358" y1="155" x2="502" y2="22"  stroke="#D4836B" stroke-width="0.5" opacity="0.05"/>

  <!-- ICON: Geometric shapes inside lens (mirrors reference style) -->
  <g clip-path="url(#r-lens)">
    <rect x="46" y="36" width="64" height="64" rx="3"
          transform="rotate(-15 78 68)"
          fill="url(#r-warm)" opacity="0.5" stroke="#D4836B" stroke-width="1.2"/>
    <rect x="72" y="52" width="64" height="64" rx="3"
          transform="rotate(15 104 84)"
          fill="url(#r-warm2)" opacity="0.5" stroke="#D4836B" stroke-width="1.2"/>
    <polygon points="88,46 112,80 88,114 64,80"
             fill="#F2BBA7" opacity="0.2" stroke="#D4836B" stroke-width="1"/>
  </g>

  <!-- ICON: Network edges (clipped to lens) -->
  <g clip-path="url(#r-lens)" fill="none" stroke="#F2BBA7" stroke-width="1.2" opacity="0.7">
    <line x1="88"  y1="80"  x2="62"  y2="57"/>
    <line x1="88"  y1="80"  x2="114" y2="57"/>
    <line x1="88"  y1="80"  x2="66"  y2="103"/>
    <line x1="88"  y1="80"  x2="110" y2="103"/>
    <line x1="62"  y1="57"  x2="114" y2="57"/>
    <line x1="66"  y1="103" x2="110" y2="103"/>
    <line x1="62"  y1="57"  x2="66"  y2="103"/>
    <line x1="114" y1="57"  x2="110" y2="103"/>
  </g>

  <!-- ICON: Network nodes (clipped to lens) -->
  <g clip-path="url(#r-lens)">
    <circle cx="88"  cy="80"  r="7"   fill="url(#r-warm)"/>
    <circle cx="62"  cy="57"  r="4.5" fill="#E8A087" opacity="0.9"/>
    <circle cx="114" cy="57"  r="4.5" fill="#E8A087" opacity="0.9"/>
    <circle cx="66"  cy="103" r="4.5" fill="#E8A087" opacity="0.9"/>
    <circle cx="110" cy="103" r="4.5" fill="#E8A087" opacity="0.9"/>
  </g>

  <!-- ICON: Magnifying glass ring -->
  <circle cx="88" cy="80" r="46" fill="none" stroke="url(#r-warm)" stroke-width="3"/>

  <!-- ICON: Handle -->
  <line x1="124" y1="116" x2="157" y2="149"
        stroke="url(#r-warm)" stroke-width="8" stroke-linecap="round"/>

  <!-- Small rotated node accents around lens (mirrors reference style) -->
  <rect x="50"  y="36"  width="5" height="5" rx="1" transform="rotate( 20  52.5  38.5)" fill="#D4836B" opacity="0.65"/>
  <rect x="121" y="36"  width="5" height="5" rx="1" transform="rotate(-20 123.5  38.5)" fill="#D4836B" opacity="0.65"/>
  <rect x="42"  y="80"  width="4" height="4" rx="1" transform="rotate( 30  44.0  82.0)" fill="#D4836B" opacity="0.50"/>
  <rect x="131" y="80"  width="4" height="4" rx="1" transform="rotate(-30 133.0  82.0)" fill="#D4836B" opacity="0.50"/>
  <rect x="57"  y="116" width="4" height="4" rx="1" transform="rotate( 15  59.0 118.0)" fill="#D4836B" opacity="0.50"/>
  <rect x="114" y="116" width="4" height="4" rx="1" transform="rotate(-15 116.0 118.0)" fill="#D4836B" opacity="0.50"/>

  <!-- Divider -->
  <line x1="194" y1="30" x2="194" y2="150" stroke="#D4836B" stroke-width="0.5" opacity="0.3"/>

  <!-- TEXT: Title -->
  <text x="216" y="82"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="700" letter-spacing="-0.5"
        fill="url(#r-text)">My Research Agent</text>

  <!-- TEXT: Subtitle -->
  <text x="218" y="108"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" letter-spacing="0.6"
        fill="#E8A087" opacity="0.65">LangGraph · LangChain · Deep Research · Multi-Step</text>

  <!-- Pills -->
  <rect x="218" y="124" width="84"  height="22" rx="11" fill="none" stroke="#D4836B" stroke-width="0.8" opacity="0.5"/>
  <text x="260" y="139" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" fill="#E8A087" opacity="0.75">LangGraph</text>

  <rect x="310" y="124" width="86"  height="22" rx="11" fill="none" stroke="#D4836B" stroke-width="0.8" opacity="0.5"/>
  <text x="353" y="139" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" fill="#E8A087" opacity="0.75">LangChain</text>

  <rect x="404" y="124" width="80"  height="22" rx="11" fill="none" stroke="#D4836B" stroke-width="0.8" opacity="0.5"/>
  <text x="444" y="139" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" fill="#E8A087" opacity="0.75">Multi-Step</text>

  <rect x="492" y="124" width="100" height="22" rx="11" fill="none" stroke="#D4836B" stroke-width="0.8" opacity="0.5"/>
  <text x="542" y="139" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" fill="#E8A087" opacity="0.75">Deep Research</text>
</svg>
