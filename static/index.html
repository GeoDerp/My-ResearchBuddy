<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Research Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.4/lib/marked.umd.js"
          integrity="sha384-8RA8Ah4c9upJmKfg5nH01OgjZoQ3mRX+ngrKYWXQYj2dHYxFqYz8POSlii33f0wB"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.7/dist/purify.min.js"
          integrity="sha384-C5g1ZoYBpnvKyArNZI21kaBEk3egHOYfHj/cUOHmyJ7CSDMyNMyM+STqfkBt8m2Y"
          crossorigin="anonymous"></script>
  <style>
    /* ── Design tokens ──────────────────────────────────────────── */
    :root {
      --bg: #faf6f3;
      --surface: #ffffff;
      --border: #e8d5cc;
      --text: #1c0e08;
      --muted: #9a7060;
      --accent: #D4836B;
      --user-bg: #D4836B;
      --user-fg: #ffffff;
      --bot-bg: #ffffff;
      --log-bg: #fdf0eb;
      --log-fg: #7a5040;
      --radius: 14px;
      --font: system-ui, -apple-system, Segoe UI, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --surface: #3a2318;
        --border: #3a2318;
        --text: #F2BBA7;
        --muted: #9a7868;
        --accent: #D4836B;
        --user-bg: #D4836B;
        --user-fg: #ffffff;
        --bot-bg: #1a1f2e;
        --log-bg: #131825;
        --log-fg: #E8A087;
      }
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
    }

    #badge {
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 99px;
      background: var(--log-bg);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .header-controls {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #new-chat-btn {
      font-size: 0.8rem;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
    }

    #new-chat-btn:hover {
      background: var(--bg);
      border-color: var(--accent);
    }

    #sidebar-toggle {
      font-size: 1.1rem;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    #sidebar-toggle:hover {
      background: var(--bg);
      border-color: var(--accent);
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    #sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    .close-sidebar {
      font-size: 1.2rem;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .close-sidebar:hover {
      background: var(--bg);
      color: var(--text);
    }

    #reports-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .no-reports {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .report-item {
      display: flex;
      align-items: stretch;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
      transition: border-color 0.15s;
    }

    .report-item:hover {
      border-color: var(--accent);
    }

    .report-item-content {
      flex: 1;
      padding: 10px 12px;
      cursor: pointer;
      min-width: 0;
    }

    .report-query {
      font-size: 0.85rem;
      line-height: 1.4;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .report-time {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .delete-btn {
      width: 36px;
      border: none;
      border-left: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
    }

    .delete-btn:hover {
      background: #fce8e6;
      color: #c62828;
    }

    @media (prefers-color-scheme: dark) {
      .delete-btn:hover {
        background: #1e1015;
        color: #F2BBA7;
      }
    }

    @media (max-width: 768px) {
      #sidebar {
        width: 100%;
      }

      .header-controls {
        gap: 6px;
      }

      #new-chat-btn {
        font-size: 0.75rem;
        padding: 4px 10px;
      }
    }

    /* ── Chat feed ──────────────────────────────────────────────── */
    #chat {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Empty state */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 10px;
      pointer-events: none;
      user-select: none;
    }

    #empty svg {
      opacity: 0.2;
    }

    #empty p {
      font-size: 0.9rem;
    }

    /* Message rows */
    .row {
      display: flex;
    }

    .row.user {
      justify-content: flex-end;
    }

    .row.bot {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(720px, 90%);
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      word-break: break-word;
    }

    .row.user .bubble {
      background: var(--user-bg);
      color: var(--user-fg);
      border-bottom-right-radius: 4px;
    }

    .row.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* ── Typing indicator ───────────────────────────────────────── */
    .typing {
      display: flex;
      gap: 5px;
      padding: 4px 0;
      align-items: center;
    }

    .typing i {
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bop 0.9s infinite;
    }

    .typing i:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing i:nth-child(3) {
      animation-delay: 0.30s;
    }

    @keyframes bop {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      40% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* ── Progress log ───────────────────────────────────────────── */
    .log-wrap {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.78rem;
    }

    .log-wrap summary {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: var(--log-bg);
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .log-wrap summary::before {
      content: "▶";
      font-size: 0.6rem;
      transition: transform 0.15s;
    }

    .log-wrap[open] summary::before {
      transform: rotate(90deg);
    }

    .log-body {
      font-family: var(--mono);
      color: var(--log-fg);
      background: var(--log-bg);
      padding: 8px 10px;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Markdown report ────────────────────────────────────────── */
    .report {
      margin-top: 10px;
      font-size: 0.9rem;
    }

    .report h1,
    .report h2,
    .report h3 {
      margin: 1em 0 0.35em;
      line-height: 1.3;
    }

    .report h1 {
      font-size: 1.2em;
    }

    .report h2 {
      font-size: 1.07em;
    }

    .report h3 {
      font-size: 1em;
    }

    .report p {
      margin: 0.45em 0;
    }

    .report ul,
    .report ol {
      padding-left: 1.4em;
      margin: 0.3em 0;
    }

    .report li {
      margin: 0.2em 0;
    }

    .report a {
      color: var(--accent);
      text-decoration: none;
    }

    .report a:hover {
      text-decoration: underline;
    }

    .report code {
      font-family: var(--mono);
      font-size: 0.83em;
      background: var(--log-bg);
      padding: 0.12em 0.3em;
      border-radius: 4px;
    }

    .report pre {
      background: var(--log-bg);
      padding: 10px 14px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.5em 0;
    }

    .report pre code {
      background: none;
      padding: 0;
    }

    .report table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.85em;
      margin: 0.6em 0;
    }

    .report th,
    .report td {
      border: 1px solid var(--border);
      padding: 0.35em 0.7em;
      text-align: left;
    }

    .report th {
      background: var(--log-bg);
      font-weight: 600;
    }

    .report tr:nth-child(even) td {
      background: var(--bg);
    }

    /* ── Error notice ───────────────────────────────────────────── */
    .err {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #c62828;
      background: #fce8e6;
      border: 1px solid #f5c6c2;
    }

    @media (prefers-color-scheme: dark) {
      .err {
        color: #F2BBA7;
        background: #1e1015;
        border-color: #5a2a1a;
      }
    }

    /* ── Input bar ──────────────────────────────────────────────── */
    #bar {
      flex: 0 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    #inp {
      flex: 1;
      font-family: var(--font);
      font-size: 0.92rem;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      resize: none;
      min-height: 42px;
      max-height: 160px;
      overflow-y: auto;
      outline: none;
      line-height: 1.45;
    }

    #inp:focus {
      border-color: var(--accent);
    }

    #inp::placeholder {
      color: var(--muted);
    }

    #btn {
      height: 42px;
      padding: 0 20px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #btn:not(:disabled):hover {
      opacity: 0.87;
    }
  </style>
</head>

<body>

  <header>
    <h1>🔬 Deep Research Agent</h1>
    <span id="badge">…</span>
    <div class="header-controls">
      <button id="new-chat-btn" title="Start new chat">+ New Chat</button>
      <button id="sidebar-toggle" title="Saved reports">📋</button>
    </div>
  </header>

  <div id="sidebar">
    <div class="sidebar-header">
      <h2>Saved Reports</h2>
      <button class="close-sidebar">✕</button>
    </div>
    <div id="reports-list"></div>
  </div>

  <div id="chat">
    <div id="empty">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <p>Ask a deep research question to get started</p>
    </div>
  </div>

  <div id="bar">
    <textarea id="inp" rows="1" autocomplete="off" spellcheck="true"
      placeholder="Ask a research question… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="btn">Send</button>
  </div>

  <script src="/static/app.js" defer></script>
</body>

</html>
